<template id="travelEntryTemplate">
    <div class="travel-entry-form">
        <h3>Travel Entry {n}</h3>
        <div class="form-group">
            <label for="travelEntry{n}Explain">Explain:</label>
            <textarea id="travelEntry{n}Explain" name="travelEntry{n}Explain"></textarea>
        </div>
        <div class="form-group">
            <label for="travelEntry{n}Date">Date:</label>
            <input type="date" id="travelEntry{n}Date" name="travelEntry{n}Date">
        </div>
    </div>
</template>
