<template id="travelIssueEntryTemplate">
    <div class="travel-issue-entry-form">
        <h3>Travel Issue Entry {n}</h3>
        <div class="form-group">
            <label for="travelIssue{n}Explain">Explanation:</label>
            <textarea id="travelIssue{n}Explain" name="travelIssue{n}Explain"></textarea>
        </div>
        <div class="form-group">
            <label for="travelIssue{n}Date">Date of Incident:</label>
            <input type="date" id="travelIssue{n}Date" name="travelIssue{n}Date">
        </div>
    </div>
</template>
